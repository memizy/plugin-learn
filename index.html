<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Learn Plugin</title>

  <script type="application/oqse-manifest+json">
  {
    "$schema": "https://cdn.jsdelivr.net/gh/memizy/oqse-specification@main/schemas/oqse-manifest-v0.1.json",
    "version": "0.1",
    "pluginVersion": "0.1.0",
    "id": "https://memizy.github.io/plugin-learn/",
    "appName": "Learn Plugin",
    "description": "Browse study set items grouped by topic. Self-assess your knowledge with traffic-light confidence dots.",
    "author": {
      "name": "Memizy"
    },
    "license": "MIT",
    "emoji": "📖",
    "studyMode": "drill",
    "capabilities": {
      "actions": ["render"],
      "types": [
        "flashcard",
        "mcq-single",
        "mcq-multi",
        "true-false",
        "match-pairs",
        "sort-items",
        "short-answer",
        "note"
      ],
      "features": [
        "markdown",
        "math",
        "html"
      ]
    }
  }
  </script>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script>
    window.MathJax = {
      tex: { inlineMath: [['$', '$'], ['\\(', '\\)']] }
    };
  </script>
  <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
  <script type="importmap">
  {
    "imports": {
      "@memizy/plugin-sdk": "https://cdn.jsdelivr.net/npm/@memizy/plugin-sdk@0.3.3/+esm"
    }
  }
  </script>

  <link
    href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&family=Source+Code+Pro:wght@500&display=swap"
    rel="stylesheet">

  <style>
    :root {
      --primary: #2c3e50;
      --accent: #3498db;
      --bg-light: #f8f9fa;
      --border: #e9ecef;
      --text: #2d3436;
      --code-bg: #f1f3f5;

      --dot-red: #e74c3c;
      --dot-orange: #e67e22;
      --dot-yellow: #f1c40f;
      --dot-green: #2ecc71;
      --dot-grey: #bdc3c7;
    }

    body {
      font-family: 'Roboto', sans-serif;
      line-height: 1.6;
      color: var(--text);
      background-color: #fff;
      max-width: 900px;
      margin: 0 auto;
      padding: 40px 20px;
    }

    h1 {
      text-align: center;
      color: var(--primary);
      font-weight: 700;
      margin-bottom: 20px;
      padding-bottom: 15px;
      border-bottom: 3px solid var(--accent);
    }

    h2 {
      color: var(--primary);
      margin-top: 50px;
      margin-bottom: 30px;
      padding-bottom: 10px;
      border-bottom: 1px solid var(--border);
    }

    details {
      background-color: #fff;
      border: 1px solid var(--border);
      border-radius: 8px;
      margin-bottom: 20px;
      box-shadow: 0 2px 5px rgba(0, 0, 0, 0.05);
      transition: all 0.3s ease;
    }

    details[open] {
      box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
      border-left: 5px solid var(--accent);
    }

    summary {
      padding: 20px;
      cursor: pointer;
      font-weight: 500;
      font-size: 1.1rem;
      list-style: none;
      position: relative;
      background-color: var(--bg-light);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    details[open] summary {
      border-radius: 8px 8px 0 0;
      border-bottom: 1px solid var(--border);
      background-color: #fff;
      color: var(--accent);
    }

    summary::-webkit-details-marker {
      display: none;
    }

    .summary-text {
      flex-grow: 1;
      padding-right: 15px;
    }

    .summary-icon {
      font-weight: bold;
      font-size: 1.5rem;
      color: var(--accent);
      margin-left: 10px;
      min-width: 20px;
      text-align: center;
    }

    details[open] .summary-icon::after {
      content: '-';
    }

    details:not([open]) .summary-icon::after {
      content: '+';
    }

    .content {
      padding: 30px;
    }

    h3 {
      color: var(--primary);
      margin-top: 25px;
      font-size: 1.15rem;
      border-bottom: 2px solid var(--bg-light);
      padding-bottom: 5px;
    }

    mjx-container[display="true"] {
      overflow-x: auto;
      overflow-y: hidden;
      max-width: 100%;
      display: block !important;
    }

    code {
      background-color: var(--code-bg);
      padding: 2px 4px;
      border-radius: 4px;
      font-family: 'Source Code Pro', monospace;
      font-size: 0.9em;
    }

    ul {
      padding-left: 20px;
    }

    li {
      margin-bottom: 8px;
    }

    strong {
      color: var(--primary);
    }

    /* Controls */
    .controls-container {
      background: var(--bg-light);
      padding: 20px;
      border-radius: 8px;
      margin-bottom: 30px;
      border: 1px solid var(--border);
    }

    .controls-row {
      display: flex;
      gap: 15px;
      align-items: center;
      flex-wrap: wrap;
      margin-bottom: 15px;
    }

    .controls-row:last-child {
      margin-bottom: 0;
    }

    select {
      padding: 10px;
      border-radius: 4px;
      border: 1px solid var(--border);
      font-size: 1rem;
      flex-grow: 1;
      max-width: 500px;
    }

    button {
      padding: 10px 20px;
      background-color: var(--accent);
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 1rem;
      transition: background-color 0.2s;
    }

    button:hover {
      background-color: #2980b9;
    }

    /* Traffic Lights */
    .traffic-lights {
      display: flex;
      gap: 5px;
      margin-right: 15px;
    }

    .dot {
      width: 16px;
      height: 16px;
      border-radius: 50%;
      cursor: pointer;
      border: 2px solid transparent;
      transition: transform 0.2s, border-color 0.2s;
      opacity: 0.3;
    }

    .dot:hover {
      transform: scale(1.2);
      opacity: 0.7;
    }

    .dot.active {
      opacity: 1;
      border-color: #555;
      transform: scale(1.1);
    }

    .dot.red {
      background-color: var(--dot-red);
    }

    .dot.orange {
      background-color: var(--dot-orange);
    }

    .dot.yellow {
      background-color: var(--dot-yellow);
    }

    .dot.green {
      background-color: var(--dot-green);
    }

    /* Filters */
    .filters {
      display: flex;
      gap: 15px;
      align-items: center;
      flex-wrap: wrap;
      font-size: 0.9rem;
    }

    .filter-label {
      font-weight: bold;
      margin-right: 5px;
    }

    .filter-option {
      display: flex;
      align-items: center;
      gap: 5px;
      cursor: pointer;
    }

    .filter-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      display: inline-block;
    }

    /* Clean Option Buttons */
    .option-btn {
      background-color: #fff;
      color: var(--text);
      border: 2px solid var(--border);
      border-radius: 8px;
      padding: 12px 16px;
      text-align: left;
      cursor: pointer;
      transition: all 0.2s ease;
      width: 100%;
      font-size: 1rem;
      margin-bottom: 8px;
      display: block;
    }

    .option-btn:hover {
      border-color: var(--accent);
      background-color: #f1f8ff;
    }

    .option-btn.correct {
      background-color: #e8f8f5;
      border-color: #2ecc71;
      color: #27ae60;
    }

    .option-btn.incorrect {
      background-color: #fdf2e9;
      border-color: #e74c3c;
      color: #c0392b;
    }

    .option-btn.selected {
      border-color: var(--accent);
      background-color: #ebf5fb;
    }

    /* Visual Separation */
    .section-divider {
      border-top: 1px dashed var(--border);
      margin: 20px 0;
      padding-top: 15px;
    }

    /* Explanation Box */
    .explanation-box {
      background-color: var(--bg-light);
      border-left: 4px solid var(--accent);
      padding: 15px 20px;
      border-radius: 0 8px 8px 0;
      margin-top: 10px;
    }

    @media (max-width: 600px) {
      .traffic-lights {
        flex-direction: column;
        gap: 8px;
        margin-right: 10px;
      }

      .dot {
        width: 20px;
        height: 20px;
      }

      summary {
        align-items: flex-start;
      }

      .summary-text {
        padding-top: 0;
        align-self: center;
      }
    }
  </style>
</head>

<body>

  <h1>Learn Plugin</h1>

  <div class="controls-container">

    <div class="controls-row">
      <label for="topic-select"><strong>Topic:</strong></label>
      <select id="topic-select">
        <option value="all" selected>All Topics</option>
      </select>
    </div>

    <div class="controls-row filters">
      <span class="filter-label">Show:</span>

      <label class="filter-option">
        <input type="checkbox" class="filter-cb" value="unmarked" checked>
        <span class="filter-dot" style="background-color: var(--dot-grey);"></span> Unmarked
      </label>
      <label class="filter-option">
        <input type="checkbox" class="filter-cb" value="red" checked>
        <span class="filter-dot" style="background-color: var(--dot-red);"></span> Don't Know
      </label>
      <label class="filter-option">
        <input type="checkbox" class="filter-cb" value="orange" checked>
        <span class="filter-dot" style="background-color: var(--dot-orange);"></span> Partially Know
      </label>
      <label class="filter-option">
        <input type="checkbox" class="filter-cb" value="yellow" checked>
        <span class="filter-dot" style="background-color: var(--dot-yellow);"></span> Almost Know
      </label>
      <label class="filter-option">
        <input type="checkbox" class="filter-cb" value="green" checked>
        <span class="filter-dot" style="background-color: var(--dot-green);"></span> Know Well
      </label>

      <span id="visible-count" style="margin-left: auto; font-weight: 500; color: #7f8c8d;"></span>
    </div>

    <div class="controls-row"
      style="margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--border); align-items: center;">
      <span class="filter-label">Progress:</span>
      <span id="progress-text" style="font-size: 0.9rem; color: #7f8c8d;">—</span>
    </div>
    <div class="controls-row"
      style="margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--border); align-items: center;">
      <span class="filter-label">Buckets:</span>
      <span id="bucket-stats" style="font-size: 0.9rem; color: #7f8c8d;">
        Unmarked: 0 | Red: 0 | Orange: 0 | Yellow: 0 | Green: 0
      </span>
    </div>

  </div>

  <div id="content-area">
    <p style="text-align: center; color: #7f8c8d;">Loading study set…</p>
  </div>

  <script type="module">
    import { MemizySDK } from '@memizy/plugin-sdk';

    const sdk = new MemizySDK({
      id: 'https://memizy.github.io/plugin-learn/',
      version: '0.1.0',
    });

    const topicSelect = document.getElementById('topic-select');
    const contentArea = document.getElementById('content-area');
    const filterCBs = document.querySelectorAll('.filter-cb');
    const visibleCount = document.getElementById('visible-count');
    const progressText = document.getElementById('progress-text');
    const bucketStats = document.getElementById('bucket-stats');

    const COLOR_TO_BUCKET = { red: 1, orange: 2, yellow: 3, green: 4 };
    const BUCKET_TO_COLOR = { 1: 'red', 2: 'orange', 3: 'yellow', 4: 'green' };
    const COLOR_LABEL = {
      red: 'Don\'t Know',
      orange: 'Partially Know',
      yellow: 'Almost Know',
      green: 'Know Well',
    };

    const progress = {};
    let allItems = [];
    let sessionActive = false;
    let topicListenerBound = false;
    let currentSetTitle = 'Learn Plugin';

    if (window.marked) {
      marked.setOptions({ breaks: true, gfm: true });
    }

    function renderMarkdown(text) {
      const input = String(text || '');
      if (!window.marked) return input;
      const blocks = [];
      const store = m => {
        blocks.push(m);
        return 'MATHPH' + (blocks.length - 1) + 'MATHPH';
      };
      let t = input.replace(/\$\$([\s\S]*?)\$\$/g, store);
      t = t.replace(/\$([^$\n]+?)\$/g, store);
      t = t.replace(/\\\(([\s\S]*?)\\\)/g, store);
      let html = marked.parse(t);
      html = html.replace(/MATHPH(\d+)MATHPH/g, (_, i) => blocks[+i]);
      return html;
    }

    function shuffleArray(input) {
      const arr = [...input];
      for (let i = arr.length - 1; i > 0; i -= 1) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }

    function bucketToColor(bucket) {
      return BUCKET_TO_COLOR[bucket] || 'unmarked';
    }

    function getAssessedCount() {
      return Object.values(progress).filter(record => record && record.bucket >= 1 && record.bucket <= 4).length;
    }

    function syncProgressSnapshot() {
      const snap = sdk.store.getProgress() || {};
      for (const key of Object.keys(progress)) delete progress[key];
      Object.assign(progress, snap);
    }

    function createRichBlock(label, value) {
      const wrap = document.createElement('div');
      wrap.style.marginTop = '14px';
      const title = document.createElement('h3');
      title.textContent = label;
      title.style.marginTop = '0';
      title.style.marginBottom = '8px';
      const body = document.createElement('div');
      body.style.fontSize = '1.05rem';
      body.style.fontWeight = '500';
      body.innerHTML = renderMarkdown(value || '');
      wrap.appendChild(title);
      wrap.appendChild(body);
      return wrap;
    }

    function addHintsAndExplanation(item, container) {
      let revealExplanation = () => { };

      if (Array.isArray(item.hints) && item.hints.length > 0) {
        const hintsSection = document.createElement('div');
        hintsSection.className = 'section-divider';
        const hintsWrap = document.createElement('div');
        const hintsTitle = document.createElement('h3');
        hintsTitle.textContent = 'Hints';
        hintsTitle.style.marginTop = '0';
        hintsTitle.style.fontSize = '0.95rem';
        hintsTitle.style.color = '#7f8c8d';
        hintsWrap.appendChild(hintsTitle);

        item.hints.forEach((hintText, idx) => {
          const hintDetails = document.createElement('details');
          hintDetails.style.marginBottom = '10px';
          const summary = document.createElement('summary');
          summary.textContent = `Hint ${idx + 1}`;
          summary.style.fontSize = '0.95rem';
          summary.style.color = '#7f8c8d';
          const content = document.createElement('div');
          content.style.padding = '12px 16px';
          content.innerHTML = renderMarkdown(hintText || '');
          hintDetails.appendChild(summary);
          hintDetails.appendChild(content);
          hintsWrap.appendChild(hintDetails);
        });

        hintsSection.appendChild(hintsWrap);
        container.appendChild(hintsSection);
      }

      if (item.explanation) {
        const expSection = document.createElement('div');
        expSection.className = 'section-divider';
        const btn = document.createElement('button');
        btn.textContent = 'Show Explanation';
        const hidden = document.createElement('div');
        hidden.style.display = 'none';
        hidden.className = 'explanation-box';
        hidden.innerHTML = `<h3 style="margin-top:0;">Explanation</h3>${renderMarkdown(item.explanation)}`;

        btn.addEventListener('click', () => {
          const isVisible = hidden.style.display !== 'none';
          hidden.style.display = isVisible ? 'none' : 'block';
          btn.textContent = isVisible ? 'Show Explanation' : 'Hide Explanation';
        });

        revealExplanation = () => {
          hidden.style.display = 'block';
          btn.textContent = 'Hide Explanation';
        };

        expSection.appendChild(btn);
        expSection.appendChild(hidden);
        container.appendChild(expSection);
      }

      return revealExplanation;
    }

    function showResult(target, ok, message) {
      target.style.marginTop = '10px';
      target.style.fontWeight = '500';
      target.style.color = ok ? '#27ae60' : '#c0392b';
      target.textContent = message;
    }

    function createInteractiveBody(item) {
      const wrap = document.createElement('div');
      wrap.style.display = 'grid';
      wrap.style.gap = '12px';

      const result = document.createElement('div');
      let revealExplanation = () => { };

      if (item.type === 'note') {
        wrap.appendChild(createRichBlock(item.title || 'Note', item.content || ''));
        if (item.hiddenContent) {
          const revealBtn = document.createElement('button');
          revealBtn.textContent = 'Reveal Hidden Content';
          const hidden = document.createElement('div');
          hidden.style.display = 'none';
          hidden.style.marginTop = '10px';
          hidden.innerHTML = renderMarkdown(item.hiddenContent);
          revealBtn.addEventListener('click', () => {
            const visible = hidden.style.display !== 'none';
            hidden.style.display = visible ? 'none' : '';
            revealBtn.textContent = visible ? 'Reveal Hidden Content' : 'Hide Hidden Content';
          });
          wrap.appendChild(revealBtn);
          wrap.appendChild(hidden);
        }
      } else if (item.type === 'flashcard') {
        wrap.appendChild(createRichBlock('Front', item.front || ''));
        const revealBtn = document.createElement('button');
        revealBtn.textContent = 'Reveal Back';
        const back = document.createElement('div');
        back.style.display = 'none';
        back.innerHTML = `<h3 style="margin-top:0;">Back</h3>${renderMarkdown(item.back || '')}`;
        revealBtn.addEventListener('click', () => {
          const visible = back.style.display !== 'none';
          back.style.display = visible ? 'none' : '';
          revealBtn.textContent = visible ? 'Reveal Back' : 'Hide Back';
        });
        wrap.appendChild(revealBtn);
        wrap.appendChild(back);
      } else if (item.type === 'true-false') {
        wrap.appendChild(createRichBlock('Question', item.question || ''));
        [true, false].forEach(value => {
          const btn = document.createElement('button');
          btn.className = 'option-btn';
          btn.textContent = value ? 'True' : 'False';
          btn.addEventListener('click', () => {
            const ok = item.answer === value;
            wrap.querySelectorAll('[data-tf-option]').forEach(optionBtn => {
              optionBtn.classList.remove('correct', 'incorrect');
            });
            btn.classList.add(ok ? 'correct' : 'incorrect');
            showResult(result, ok, ok ? 'Correct.' : 'Incorrect.');
            revealExplanation();
          });
          btn.dataset.tfOption = '1';
          wrap.appendChild(btn);
        });
      } else if (item.type === 'mcq-single') {
        wrap.appendChild(createRichBlock('Question', item.question || ''));
        const optionEntries = (item.options || []).map((opt, idx) => ({ text: opt, originalIndex: idx }));
        const renderedOptions = item.shuffleOptions === false ? optionEntries : shuffleArray(optionEntries);
        renderedOptions.forEach(entry => {
          const optBtn = document.createElement('button');
          optBtn.className = 'option-btn';
          optBtn.innerHTML = renderMarkdown(entry.text || '');
          optBtn.addEventListener('click', () => {
            const all = wrap.querySelectorAll('[data-mcq-option]');
            all.forEach(el => el.classList.remove('correct', 'incorrect'));
            const ok = entry.originalIndex === item.correctIndex;
            optBtn.classList.add(ok ? 'correct' : 'incorrect');
            showResult(result, ok, ok ? 'Correct.' : 'Incorrect.');
            revealExplanation();
          });
          optBtn.dataset.mcqOption = '1';
          wrap.appendChild(optBtn);
        });
      } else if (item.type === 'mcq-multi') {
        wrap.appendChild(createRichBlock('Question', item.question || ''));
        const selected = new Set();
        const optionEntries = (item.options || []).map((opt, idx) => ({ text: opt, originalIndex: idx }));
        const renderedOptions = item.shuffleOptions === false ? optionEntries : shuffleArray(optionEntries);
        renderedOptions.forEach(entry => {
          const row = document.createElement('label');
          row.className = 'option-btn';
          row.style.display = 'flex';
          row.style.alignItems = 'center';
          row.style.gap = '8px';
          const cb = document.createElement('input');
          cb.type = 'checkbox';
          cb.addEventListener('change', () => {
            if (cb.checked) selected.add(entry.originalIndex);
            else selected.delete(entry.originalIndex);
            row.classList.toggle('selected', cb.checked);
          });
          const text = document.createElement('span');
          text.innerHTML = renderMarkdown(entry.text || '');
          row.appendChild(cb);
          row.appendChild(text);
          row.dataset.multiOption = String(entry.originalIndex);
          wrap.appendChild(row);
        });
        const checkBtn = document.createElement('button');
        checkBtn.textContent = 'Check';
        checkBtn.addEventListener('click', () => {
          const correct = new Set(item.correctIndices || []);
          let allCorrect = selected.size === correct.size;
          wrap.querySelectorAll('[data-multi-option]').forEach(row => {
            const idx = Number(row.dataset.multiOption);
            const isChosen = selected.has(idx);
            const isCorrect = correct.has(idx);
            row.classList.remove('correct', 'incorrect');
            if (isChosen) row.classList.add(isCorrect ? 'correct' : 'incorrect');
            if (isChosen !== isCorrect) allCorrect = false;
          });
          showResult(result, allCorrect, allCorrect ? 'Correct selection set.' : 'Selection set is not fully correct.');
          revealExplanation();
        });
        wrap.appendChild(checkBtn);
      } else if (item.type === 'short-answer') {
        wrap.appendChild(createRichBlock('Question', item.question || ''));
        const input = document.createElement('input');
        input.type = 'text';
        input.placeholder = 'Type your answer...';
        input.style.padding = '10px';
        input.style.borderRadius = '4px';
        input.style.border = '1px solid var(--border)';
        const checkBtn = document.createElement('button');
        checkBtn.textContent = 'Check';
        checkBtn.addEventListener('click', () => {
          const trimWhitespace = item.trimWhitespace !== false;
          const caseSensitive = item.caseSensitive === true;
          const normalize = value => {
            let next = String(value ?? '');
            if (trimWhitespace) next = next.trim();
            if (!caseSensitive) next = next.toLowerCase();
            return next;
          };
          const expectedRaw = Array.isArray(item.answers)
            ? item.answers
            : (item.answer ? [item.answer] : []);
          const expected = expectedRaw.map(normalize);
          const guess = normalize(input.value);
          const ok = expected.includes(guess);
          input.style.borderColor = ok ? '#2ecc71' : '#e74c3c';
          showResult(result, ok, ok ? 'Correct.' : 'Not a matching answer.');
          revealExplanation();
        });
        wrap.appendChild(input);
        wrap.appendChild(checkBtn);
      } else if (item.type === 'match-pairs') {
        wrap.appendChild(createRichBlock('Question', item.question || 'Match pairs:'));
        const leftTitle = document.createElement('h3');
        leftTitle.style.margin = '0';
        leftTitle.textContent = 'Prompts';
        wrap.appendChild(leftTitle);

        const current = { left: null };
        const links = {};
        const leftList = document.createElement('div');
        const rightList = document.createElement('div');
        leftList.style.display = 'grid';
        rightList.style.display = 'grid';
        leftList.style.gap = '6px';
        rightList.style.gap = '6px';

        const leftEntries = shuffleArray((item.prompts || []).map((prompt, idx) => ({ text: prompt, originalIndex: idx })));
        const rightEntries = shuffleArray((item.matches || []).map((matchText, idx) => ({ text: matchText, originalIndex: idx })));

        leftEntries.forEach(entry => {
          const row = document.createElement('button');
          row.className = 'option-btn';
          row.innerHTML = renderMarkdown(entry.text || '');
          row.dataset.leftIdx = String(entry.originalIndex);
          row.addEventListener('click', () => {
            current.left = entry.originalIndex;
            leftList.querySelectorAll('button').forEach(btn => {
              btn.classList.remove('selected');
            });
            row.classList.add('selected');
          });
          leftList.appendChild(row);
        });

        const rightTitle = document.createElement('h3');
        rightTitle.style.margin = '6px 0 0';
        rightTitle.textContent = 'Matches';

        rightEntries.forEach(entry => {
          const row = document.createElement('button');
          row.className = 'option-btn';
          row.innerHTML = renderMarkdown(entry.text || '');
          row.dataset.rightIdx = String(entry.originalIndex);
          row.addEventListener('click', () => {
            if (current.left === null) return;
            links[current.left] = entry.originalIndex;
            const leftBtn = leftList.querySelector(`[data-left-idx="${current.left}"]`);
            if (leftBtn) leftBtn.classList.remove('selected');
            current.left = null;
          });
          rightList.appendChild(row);
        });

        const checkBtn = document.createElement('button');
        checkBtn.textContent = 'Check';
        checkBtn.addEventListener('click', () => {
          let ok = true;
          leftList.querySelectorAll('button').forEach(btn => {
            const leftIdx = Number(btn.dataset.leftIdx);
            const chosenRight = links[leftIdx];
            const isCorrect = chosenRight === leftIdx;
            btn.classList.remove('correct', 'incorrect');
            if (typeof chosenRight === 'number') btn.classList.add(isCorrect ? 'correct' : 'incorrect');
            if (!isCorrect) ok = false;
          });
          showResult(result, ok, ok ? 'All pairs are correct.' : 'Some matches are incorrect.');
          revealExplanation();
        });

        wrap.appendChild(leftList);
        wrap.appendChild(rightTitle);
        wrap.appendChild(rightList);
        wrap.appendChild(checkBtn);
      } else if (item.type === 'sort-items') {
        wrap.appendChild(createRichBlock('Question', item.question || 'Sort items:'));
        const ordered = [...(item.items || [])];
        const shuffled = shuffleArray(ordered);
        const list = document.createElement('div');
        list.style.display = 'grid';
        list.style.gap = '8px';

        function rerenderList() {
          list.innerHTML = '';
          shuffled.forEach((entry, idx) => {
            const row = document.createElement('div');
            row.style.display = 'grid';
            row.style.gridTemplateColumns = '1fr auto auto';
            row.style.gap = '8px';
            row.style.alignItems = 'center';
            const text = document.createElement('div');
            text.innerHTML = renderMarkdown(entry || '');
            const up = document.createElement('button');
            up.textContent = '↑';
            up.style.padding = '6px 10px';
            const down = document.createElement('button');
            down.textContent = '↓';
            down.style.padding = '6px 10px';
            up.addEventListener('click', () => {
              if (idx === 0) return;
              [shuffled[idx - 1], shuffled[idx]] = [shuffled[idx], shuffled[idx - 1]];
              rerenderList();
            });
            down.addEventListener('click', () => {
              if (idx === shuffled.length - 1) return;
              [shuffled[idx + 1], shuffled[idx]] = [shuffled[idx], shuffled[idx + 1]];
              rerenderList();
            });
            row.appendChild(text);
            row.appendChild(up);
            row.appendChild(down);
            list.appendChild(row);
          });
        }

        rerenderList();
        const checkBtn = document.createElement('button');
        checkBtn.textContent = 'Check';
        checkBtn.addEventListener('click', () => {
          const ok = shuffled.every((entry, idx) => entry === ordered[idx]);
          showResult(result, ok, ok ? 'Order is correct.' : 'Order is not correct yet.');
          revealExplanation();
        });
        wrap.appendChild(list);
        wrap.appendChild(checkBtn);
      } else {
        if (item.content) wrap.appendChild(createRichBlock(item.title || item.type, item.content));
        else wrap.appendChild(createRichBlock('Item', 'Unsupported item type payload.'));
      }

      wrap.appendChild(result);
      revealExplanation = addHintsAndExplanation(item, wrap);
      return wrap;
    }

    function updateBucketStats() {
      const counts = { unmarked: 0, red: 0, orange: 0, yellow: 0, green: 0 };
      for (const item of allItems) {
        const color = bucketToColor(progress[item.id]?.bucket);
        if (color === 'red') counts.red += 1;
        else if (color === 'orange') counts.orange += 1;
        else if (color === 'yellow') counts.yellow += 1;
        else if (color === 'green') counts.green += 1;
        else counts.unmarked += 1;
      }
      bucketStats.textContent =
        `Unmarked: ${counts.unmarked} | Red: ${counts.red} | Orange: ${counts.orange} | Yellow: ${counts.yellow} | Green: ${counts.green}`;
    }

    function populateTopicSelect(items) {
      topicSelect.innerHTML = '<option value="all" selected>All Topics</option>';
      const seen = new Set();
      const ordered = [];
      for (const item of items) {
        const t = item.topic;
        if (t && !seen.has(t)) {
          seen.add(t);
          ordered.push(t);
        }
      }
      ordered.forEach(topic => {
        const opt = document.createElement('option');
        opt.value = topic;
        opt.textContent = topic;
        topicSelect.appendChild(opt);
      });

      if (!topicListenerBound) {
        topicSelect.addEventListener('change', () => {
          const val = topicSelect.value;
          const filtered = val === 'all' ? allItems : allItems.filter(i => i.topic === val);
          renderAll(filtered);
        });
        topicListenerBound = true;
      }
    }

    function createTrafficLights(item, currentColor, detailsEl) {
      const wrap = document.createElement('div');
      wrap.className = 'traffic-lights';
      ['red', 'orange', 'yellow', 'green'].forEach(color => {
        const dot = document.createElement('div');
        dot.className = `dot ${color}${currentColor === color ? ' active' : ''}`;
        dot.title = COLOR_LABEL[color];
        dot.addEventListener('click', async e => {
          e.preventDefault();
          e.stopPropagation();
          await handleDotClick(item.id, color, detailsEl);
        });
        wrap.appendChild(dot);
      });
      return wrap;
    }

    function buildItemElement(item) {
      const currentColor = bucketToColor(progress[item.id]?.bucket);

      const details = document.createElement('details');
      details.dataset.id = item.id;
      details.dataset.color = currentColor;
      details.dataset.role = 'item';

      const summary = document.createElement('summary');
      summary.appendChild(createTrafficLights(item, currentColor, details));
      const textSpan = document.createElement('span');
      textSpan.className = 'summary-text';
      textSpan.textContent = item.title || item.question || item.front || item.type || 'Untitled';
      const iconSpan = document.createElement('span');
      iconSpan.className = 'summary-icon';
      summary.appendChild(textSpan);
      summary.appendChild(iconSpan);

      const contentDiv = document.createElement('div');
      contentDiv.className = 'content';
      contentDiv.appendChild(createInteractiveBody(item));

      details.appendChild(summary);
      details.appendChild(contentDiv);
      return details;
    }

    async function handleDotClick(itemId, color, detailsEl) {
      if (!sessionActive) return;
      const newBucket = COLOR_TO_BUCKET[color];
      const currentProgress = progress[itemId] || { stats: { attempts: 0, incorrect: 0, streak: 0 } };
      const previousStats = currentProgress.stats || { attempts: 0, incorrect: 0, streak: 0 };
      const updated = {
        ...currentProgress,
        bucket: newBucket,
        stats: {
          attempts: (previousStats.attempts || 0) + 1,
          incorrect: (previousStats.incorrect || 0) + (newBucket <= 2 ? 1 : 0),
          streak: newBucket >= 3 ? (previousStats.streak || 0) + 1 : 0,
        },
      };

      await sdk.store.syncProgress({ [itemId]: updated });
      progress[itemId] = updated;

      detailsEl.dataset.color = color;
      detailsEl.querySelectorAll('.dot').forEach(dot => {
        dot.classList.toggle('active', dot.classList.contains(color));
      });

      const answered = getAssessedCount();
      updateProgressText(answered, allItems.length);
      updateBucketStats();
      applyFilters();
    }

    function renderAll(items) {
      contentArea.innerHTML = '';
      if (!items || items.length === 0) {
        contentArea.innerHTML = '<p style="text-align:center;color:#7f8c8d;">No items to display.</p>';
        updateCount();
        return;
      }

      const groups = new Map();
      for (const item of items) {
        const t = item.topic || 'Other';
        if (!groups.has(t)) groups.set(t, []);
        groups.get(t).push(item);
      }

      for (const [topic, groupItems] of groups) {
        const h2 = document.createElement('h2');
        h2.textContent = topic || 'Other';
        contentArea.appendChild(h2);
        for (const item of groupItems) {
          contentArea.appendChild(buildItemElement(item));
        }
      }

      if (window.MathJax) {
        MathJax.typesetPromise([contentArea]).catch(e => console.warn('MathJax:', e));
      }

      applyFilters();
    }

    function applyFilters() {
      const active = new Set(Array.from(filterCBs).filter(cb => cb.checked).map(cb => cb.value));
      const allDetails = contentArea.querySelectorAll('details[data-role="item"]');
      let shown = 0;
      allDetails.forEach(d => {
        const vis = active.has(d.dataset.color || 'unmarked');
        d.style.display = vis ? '' : 'none';
        if (vis) shown++;
      });
      updateCount(shown, allDetails.length);
    }

    function updateCount(shown, total) {
      if (shown === undefined) {
        const all = contentArea.querySelectorAll('details[data-role="item"]');
        shown = Array.from(all).filter(d => d.style.display !== 'none').length;
        total = all.length;
      }
      visibleCount.textContent = total !== undefined ? `Showing: ${shown} / ${total}` : '';
    }

    function updateProgressText(answered, total) {
      progressText.textContent = `${answered} / ${total} assessed`;
    }

    filterCBs.forEach(cb => cb.addEventListener('change', applyFilters));

    sdk.onSessionAborted(() => {
      sessionActive = false;
    });

    sdk.onSetUpdated(() => {
      const payload = sdk.session;
      if (!payload) return;
      allItems = payload.items || [];
      syncProgressSnapshot();
      populateTopicSelect(allItems);
      renderAll(allItems);
      updateProgressText(getAssessedCount(), allItems.length);
      updateBucketStats();
    });

    async function init() {
      try {
        const session = await sdk.connect();
        allItems = session.items || [];
        sessionActive = true;

        currentSetTitle = session.meta?.title ?? session.meta?.name ?? session.settings?.title ?? currentSetTitle;
        document.title = currentSetTitle;
        document.querySelector('h1').textContent = currentSetTitle;

        syncProgressSnapshot();
        populateTopicSelect(allItems);
        renderAll(allItems);
        updateProgressText(getAssessedCount(), allItems.length);
        updateBucketStats();
      } catch (error) {
        console.error(error);
        contentArea.innerHTML = '<p style="text-align:center;color:#c0392b;">Failed to initialize Learn Plugin session.</p>';
      }
    }

    init();
  </script>
</body>
